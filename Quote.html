<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Quote</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

  <!-- 🌐 Navigation Bar -->
  <nav class="bg-white shadow-sm">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold text-blue-700">Globalnet Tech Solutions</a>
      <ul class="flex space-x-6">
        <li><a href="index.html" class="text-gray-700 hover:text-blue-600">Home</a></li>
        <li><a href="about.html" class="text-gray-700 hover:text-blue-600">About</a></li>
        <li><a href="services.html" class="text-gray-700 hover:text-blue-600">Services</a></li>
        <li><a href="contact.html" class="text-gray-700 hover:text-blue-600">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- 🧾 Quote Form Section -->
  <section class="max-w-3xl mx-auto mt-12 bg-white shadow-md rounded-lg p-8">
    <h2 class="text-2xl font-semibold text-center text-blue-700 mb-6">Request a Free Quote</h2>

    <form id="quoteForm" class="space-y-4">
      <div>
        <label class="block text-gray-700 mb-1">Full Name</label>
        <input type="text" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-gray-700 mb-1">Email</label>
        <input type="email" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-gray-700 mb-1">Service Type</label>
        <select class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option>Web Development</option>
          <option>Cyber Security</option>
          <option>Software Development</option>
          <option>Accounting Services</option>
        </select>
      </div>
      <div>
        <label class="block text-gray-700 mb-1">Project Description</label>
        <textarea rows="4" required class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-2 rounded-lg hover:from-blue-600 hover:to-purple-700 transition-all">
        Submit Request
      </button>
    </form>

    <p id="confirmationMessage" class="text-green-600 text-center mt-4 hidden">✅ Thank you! Your quote request has been submitted.</p>
  </section>

  <!-- ✅ Simple JS to handle form submission -->
  <script>
    const form = document.getElementById('quoteForm');
    const message = document.getElementById('confirmationMessage');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      message.classList.remove('hidden');
      form.reset();
      setTimeout(() => message.classList.add('hidden'), 5000);
    });
  </script>

</body>
</html>
