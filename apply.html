<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply Now | Globalnet Tech Solutions</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- 🌐 Navigation Bar -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold text-blue-700">Globalnet Tech Solutions</a>
      <div class="space-x-6">
        <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
        <a href="index.html#positions" class="text-gray-700 hover:text-blue-600 font-medium">Careers</a>
        <a href="apply.html" class="text-blue-600 font-semibold">Apply</a>
      </div>
    </div>
  </nav>

  <!-- 📝 Application Form Section -->
  <section class="max-w-4xl mx-auto mt-12 bg-white rounded-2xl shadow-lg p-10">
    <h1 class="text-3xl font-bold text-center text-blue-700 mb-6">Job Application Form</h1>
    <p class="text-center text-gray-600 mb-10">
      Fill in the form below to apply for your desired position. Ensure all details are accurate before submitting.
    </p>

    <form id="applicationForm" class="space-y-8">
      <!-- Job Info -->
      <div>
        <label for="position" class="block text-gray-700 font-semibold mb-2">Position Applying For</label>
        <select id="position" name="position" required class="w-full border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
          <option value="">-- Select Position --</option>
          <option value="Junior Cyber Security Officer">Junior Cyber Security Officer</option>
          <option value="Junior Software Developer">Junior Software Developer</option>
          <option value="Junior Accountant">Junior Accountant</option>
        </select>
      </div>

      <!-- Personal Info -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
          <input id="fullName" name="fullName" type="text" required placeholder="Enter your full name"
                 class="w-full border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
          <input id="email" name="email" type="email" required placeholder="Enter your email"
                 class="w-full border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Phone Number</label>
          <input id="phone" name="phone" type="tel" required placeholder="+254 700 000 000"
                 class="w-full border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Location</label>
          <input id="location" name="location" type="text" placeholder="City, Country"
                 class="w-full border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- Education & Experience -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Highest Education Level</label>
        <input id="education" name="education" type="text" placeholder="e.g. Bachelor's in Computer Science"
               class="w-full border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Work Experience</label>
        <textarea id="experience" name="experience" rows="4" placeholder="Briefly describe your experience"
                  class="w-full border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <!-- Resume Upload -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Upload Resume (PDF or DOC)</label>
        <input id="resume" name="resume" type="file" accept=".pdf,.doc,.docx" required
               class="w-full border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Cover Letter -->
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Cover Letter</label>
        <textarea id="coverLetter" name="coverLetter" rows="5" placeholder="Write a short cover letter..."
                  class="w-full border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <!-- Submit -->
      <div class="text-center">
        <button type="submit"
                class="bg-blue-600 text-white px-10 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-all">
          Submit Application
        </button>
      </div>
    </form>
  </section>

  <div id="successMessage" class="hidden text-center mt-10 text-green-600 font-semibold">
    ✅ Your application has been submitted successfully!
  </div>

  <!-- 🧠 Firebase Integration -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

    // 🔧 Replace this with your Firebase Config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "yourproject.firebaseapp.com",
      projectId: "yourproject",
      storageBucket: "yourproject.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // 🔥 Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // 🧩 Handle Form Submission
    const form = document.getElementById('applicationForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const resumeFile = form.resume.files[0];
      const resumeRef = ref(storage, `resumes/${Date.now()}_${resumeFile.name}`);

      try {
        // 1️⃣ Upload the resume to Firebase Storage
        await uploadBytes(resumeRef, resumeFile);
        const resumeURL = await getDownloadURL(resumeRef);

        // 2️⃣ Save applicant data + resume link in Firestore
        await addDoc(collection(db, "applications"), {
          timestamp: serverTimestamp(),
          fullName: form.fullName.value,
          email: form.email.value,
          phone: form.phone.value,
          location: form.location.value,
          position: form.position.value,
          education: form.education.value,
          experience: form.experience.value,
          coverLetter: form.coverLetter.value,
          resumeURL: resumeURL
        });

        // ✅ Success feedback
        successMessage.classList.remove('hidden');
        form.reset();
        window.scrollTo({ top: 0, behavior: 'smooth' });

      } catch (error) {
        console.error("Error submitting application:", error);
        alert("❌ Failed to submit. Please try again later.");
      }
    });

    // 🔄 Optional: Auto-fill job title
    const params = new URLSearchParams(window.location.search);
    const job = params.get('position');
    if (job) document.getElementById('position').value = job;
  </script>

  <footer class="mt-20 bg-gray-100 text-center py-6 text-sm text-gray-600">
    © 2025 YourCompany. All rights reserved.
  </footer>
</body>
</html>
